services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3100:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3101/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:3101
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3101:3001"
    env_file:
      - ./backend/.env
    volumes:
      - ~/.ssh:/root/.ssh:ro
    restart: unless-stopped
